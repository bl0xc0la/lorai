<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lora Vision Editor</title>
    <style>
        :root {
            --bg-main: #212121;
            --bg-sidebar: #171717;
            --panel-border: #303030;
            --input-wrapper: #2f2f2f;
            --text-primary: #ececec;
            --text-muted: #b4b4b4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg-main); color: var(--text-primary); display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        /* Layout Grid */
        .editor-container { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--panel-border); }
        .toolbar { height: 56px; background: var(--bg-sidebar); border-bottom: 1px solid var(--panel-border); display: flex; align-items: center; padding: 0 20px; gap: 12px; }
        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; background: #1a1a1a; position: relative; }
        canvas { max-width: 100%; max-height: 100%; background: #111; border: 1px dashed var(--panel-border); box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        
        /* Chat Sidebar */
        .ai-sidebar { width: 340px; background: var(--bg-sidebar); display: flex; flex-direction: column; }
        .chat-header { padding: 16px; border-bottom: 1px solid var(--panel-border); font-size: 0.9rem; font-weight: 600; color: #a855f7; }
        .chat-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
        .msg { font-size: 0.9rem; line-height: 1.5; padding: 10px 14px; border-radius: 18px; max-width: 85%; word-break: break-word; }
        .user-msg { background: var(--input-wrapper); align-self: flex-end; }
        .ai-msg { background: rgba(168, 85, 247, 0.1); border: 1px solid rgba(168, 85, 247, 0.2); align-self: flex-start; }
        
        /* Forms & Inputs UI */
        .chat-input-area { padding: 16px; border-top: 1px solid var(--panel-border); }
        .chat-form { display: flex; background: var(--input-wrapper); border-radius: 20px; padding: 4px 8px; align-items: center; }
        .chat-form input { flex: 1; background: transparent; border: none; outline: none; color: var(--text-primary); padding: 8px; font-size: 0.9rem; }
        .btn { background: var(--input-wrapper); color: var(--text-primary); border: 1px solid var(--panel-border); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
        .btn:hover { background: var(--panel-border); }
        .send-btn { background: var(--text-primary); color: var(--bg-main); border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        #fileInput { display: none; }
    </style>
</head>
<body>

    <div class="editor-container">
        <div class="toolbar">
            <button class="btn" onclick="document.getElementById('fileInput').click()">Upload Image</button>
            <input type="file" id="fileInput" accept="image/*">
            <button class="btn" onclick="resetCanvas()">Clear Adjustments</button>
        </div>
        <div class="canvas-area">
            <canvas id="editorCanvas"></canvas>
        </div>
    </div>

    <div class="ai-sidebar">
        <div class="chat-header">Lora OS // Canvas Pilot Engine</div>
        <div class="chat-messages" id="chatMessages">
            <div class="msg ai-msg">Hi Cola! Upload a picture, then ask me to add text elements, shapes, or apply filters!</div>
        </div>
        <div class="chat-input-area">
            <form id="chatForm" class="chat-form-wrapper chat-form">
                <input type="text" id="userInput" placeholder="Ask Lora to edit or add things..." autocomplete="off" required>
                <button type="submit" class="send-btn">➔</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8000/chat";
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');
        let originalImage = null;

        // Initialize empty canvas template size
        canvas.width = 600;
        canvas.height = 400;
        ctx.fillStyle = "#2a2a2a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Image upload management handler
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                originalImage = new Image();
                originalImage.onload = function() {
                    canvas.width = originalImage.width > 800 ? 800 : originalImage.width;
                    canvas.height = (canvas.width / originalImage.width) * originalImage.height;
                    renderBase();
                }
                originalImage.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        });

        function renderBase() {
            if (originalImage) {
                ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
            }
        }

        function resetCanvas() {
            if (originalImage) renderBase();
        }

        // Executing Canvas Manipulation Operations Based on Lora Command Array Matrix
        function executeEditCommand(commandString) {
            try {
                // Find and extract JSON from text if markdown wrappers are present
                const jsonStart = commandString.indexOf('{');
                const jsonEnd = commandString.lastIndexOf('}');
                if (jsonStart === -1 || jsonEnd === -1) return;
                
                const data = JSON.parse(commandString.substring(jsonStart, jsonEnd + 1));
                
                if (data.action === "add_text") {
                    ctx.font = `${data.size || 30}px Arial`;
                    ctx.fillStyle = data.color || "white";
                    ctx.fillText(data.text, data.x || 50, data.y || 100);
                } 
                else if (data.action === "add_shape") {
                    ctx.fillStyle = data.color || "red";
                    if (data.shape === "rect") {
                        ctx.fillRect(data.x || 50, data.y || 50, data.w || 100, data.h || 100);
                    }
                } 
                else if (data.action === "apply_filter") {
                    ctx.save();
                    if (data.filter === "grayscale") ctx.filter = "grayscale(100%)";
                    if (data.filter === "invert") ctx.filter = "invert(100%)";
                    if (data.filter === "sepia") ctx.filter = "sepia(100%)";
                    ctx.drawImage(canvas, 0, 0);
                    ctx.restore();
                }
            } catch (e) {
                console.error("Failed to parse visual action layer:", e);
            }
        }

        // Chat Form Handler
        document.getElementById('chatForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userInput = document.getElementById('userInput');
            const query = userInput.value.trim();
            if (!query) return;

            userInput.value = "";
            appendMessage(query, true);

            const msgNode = appendMessage("Lora is reading layout canvas...", false);

            // Give Lora structural context on how to respond via JSON directives
            const engineeredPrompt = `The user wants to make a photo modification layout edit. Request: "${query}". Respond ONLY with a brief natural confirmation message followed by a JSON formatting layer. Do not write complex prose blocks outside this format structure.
            If adding text, include: {"action": "add_text", "text": "value", "x": 50, "y": 100, "color": "white", "size": 30}
            If adding shapes, include: {"action": "add_shape", "shape": "rect", "x": 100, "y": 100, "w": 150, "h": 150, "color": "blue"}
            If updating filters, include: {"action": "apply_filter", "filter": "grayscale" | "invert" | "sepia"}`;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: engineeredPrompt })
                });

                if (!response.ok) throw new Error();

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                msgNode.textContent = ""; 
                let fullResponse = "";

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    fullResponse += chunk;
                    msgNode.textContent += chunk;
                }

                // Fire automation handler to parse incoming directives matrix
                executeEditCommand(fullResponse);

            } catch (err) {
                msgNode.textContent = "Could not link execution commands to Lora Core Server.";
            }
        });

        function appendMessage(text, isUser) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.classList.add('msg', isUser ? 'user-msg' : 'ai-msg');
            div.textContent = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
