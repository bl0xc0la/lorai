<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lora AI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #0d0d0f;
            --bg-sidebar: #151517;
            --border-color: #222225;
            --text-main: #a1a1a6;
            --text-muted: #515156;
            --text-heading: #ffffff;
            --btn-secondary: #1c1c1f;
            --btn-danger: #2a1a1a;
            --text-danger: #ff453a;
            --input-bg: #141416;
            --code-bg: #050506;
            --accent: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Geist Mono", monospace; }
        
        body { background: var(--bg-main); color: var(--text-main); display: flex; height: 100dvh; overflow: hidden; -webkit-font-smoothing: antialiased; }

        /* Minimal Sidebar with collapsing capability */
        .sidebar { width: 240px; background: var(--bg-sidebar); display: flex; flex-direction: column; padding: 24px 16px; border-right: 1px solid var(--border-color); z-index: 100; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s cubic-bezier(0.4, 0, 0.2, 1), padding 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar.collapsed { width: 0; padding-left: 0; padding-right: 0; border-right: none; overflow: hidden; pointer-events: none; }
        .sidebar.collapsed * { opacity: 0; pointer-events: none; }
        
        .sidebar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; padding: 0 4px; width: 100%; }
        .logo-text { font-size: 0.95rem; font-weight: 600; color: var(--text-heading); letter-spacing: -0.3px; white-space: nowrap; }
        
        .new-session-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; display: flex; align-items: center; gap: 6px; transition: all 0.2s ease; white-space: nowrap; }
        .new-session-btn:hover { background: var(--btn-secondary); color: var(--text-heading); }
        
        .section-title { font-size: 0.65rem; text-transform: uppercase; color: var(--text-muted); margin: 24px 0 8px 4px; font-weight: 700; letter-spacing: 1px; white-space: nowrap; }
        
        .model-switcher-tabs { display: flex; flex-direction: column; gap: 4px; }
        .tab-btn { width: 100%; text-align: left; padding: 10px 12px; border-radius: 8px; border: none; font-size: 0.8rem; cursor: pointer; background: transparent; color: var(--text-main); display: flex; align-items: center; gap: 10px; transition: all 0.2s ease; white-space: nowrap; }
        .tab-btn:hover { background: rgba(255,255,255,0.02); }
        .tab-btn.active { background: var(--btn-secondary); color: var(--text-heading); font-weight: 500; }
        .tab-btn svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 1.5; flex-shrink: 0; }

        .selector-wrapper { position: relative; width: 100%; }
        .selector-element { width: 100%; background: transparent; color: var(--text-main); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px 12px; cursor: pointer; outline: none; font-size: 0.8rem; appearance: none; -webkit-appearance: none; transition: border-color 0.2s ease; }
        .selector-element:hover { border-color: #333336; }
        .selector-wrapper svg { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 12px; height: 12px; fill: none; stroke: var(--text-muted); stroke-width: 1.5; pointer-events: none; }

        .sidebar-footer { margin-top: auto; display: flex; flex-direction: column; gap: 8px; }
        .delete-btn { width: 100%; text-align: left; padding: 10px 12px; border-radius: 8px; border: 1px solid transparent; font-size: 0.8rem; cursor: pointer; background: transparent; color: var(--text-muted); display: flex; align-items: center; gap: 10px; transition: all 0.2s ease; white-space: nowrap; }
        .delete-btn:hover { background: var(--btn-danger); color: var(--text-danger); border-color: rgba(255, 69, 58, 0.2); }
        .delete-btn svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 1.5; flex-shrink: 0; }

        /* Desktop Floating Menu Button (Appears when sidebar is hidden) */
        .desktop-nav-trigger { display: flex; position: fixed; top: 20px; left: 20px; z-index: 80; }

        /* Mobile Specific Elements */
        .mobile-header { display: none; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--bg-sidebar); border-bottom: 1px solid var(--border-color); z-index: 90; }
        .mobile-header .logo-text { font-size: 0.9rem; }
        
        .icon-btn { background: transparent; border: none; color: var(--text-main); display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        .icon-btn:hover { background: var(--btn-secondary); color: var(--text-heading); }
        .icon-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); z-index: 95; opacity: 0; transition: opacity 0.3s ease; }

        /* Clean Chat Canvas */
        .main-content { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); width: 100%; position: relative; }
        .chat-messages { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 36px; max-width: 760px; width: 100%; margin: 0 auto; scroll-behavior: smooth; }
        
        .message { max-width: 100%; line-height: 1.7; font-size: 0.9rem; color: var(--text-main); display: flex; flex-direction: column; animation: fadeIn 0.2s ease-out forwards; word-wrap: break-word; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        
        .user { color: var(--text-heading); border-left: 2px solid var(--text-muted); padding-left: 16px; margin-left: 2px; }
        .lora { width: 100%; }

        /* Foldable Thinking Logs */
        .thinking-block { background: rgba(255, 255, 255, 0.02); border-left: 1px solid var(--border-color); padding: 8px 16px; margin-bottom: 16px; font-size: 0.8rem; border-radius: 0 4px 4px 0; }
        .thinking-header { cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 500; color: var(--text-muted); user-select: none; transition: color 0.2s; }
        .thinking-header:hover { color: var(--text-main); }
        .thinking-header svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 1.5; transform: rotate(90deg); transition: transform 0.2s; }
        .thinking-block.collapsed .thinking-header svg { transform: rotate(0deg); }
        .thinking-block.collapsed .thinking-body { display: none; }
        .thinking-body { padding-top: 8px; line-height: 1.6; color: var(--text-muted); }

        .thinking-dots { display: inline-flex; align-items: center; gap: 4px; padding: 8px 0; }
        .thinking-dots span { width: 4px; height: 4px; background-color: var(--text-muted); border-radius: 50%; animation: bounceDot 1.4s infinite ease-in-out both; }
        .thinking-dots span:nth-child(1) { animation-delay: -0.32s; }
        .thinking-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounceDot { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }

        /* Unified Code Blocks */
        .code-container { background: var(--code-bg); border-radius: 8px; margin: 18px 0; overflow: hidden; border: 1px solid var(--border-color); max-width: 100%; }
        .code-header { background: #0b0b0d; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; color: var(--text-muted); border-bottom: 1px solid var(--border-color); }
        .copy-btn { background: transparent; color: var(--text-muted); border: 1px solid var(--border-color); padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 0.7rem; transition: all 0.2s; }
        .copy-btn:hover { color: var(--text-heading); border-color: var(--text-muted); }
        .code-container pre { padding: 16px; overflow-x: auto; margin: 0; max-width: 100%; }
        .code-container code { font-family: "Geist Mono", monospace; color: #e1e1e6; font-size: 0.85rem; }

        /* Floating Input Layout */
        .chat-input-area { padding: 0 40px 40px 40px; max-width: 760px; width: 100%; margin: 0 auto; position: relative; z-index: 10; }
        .input-wrapper { display: flex; align-items: center; background: rgba(20, 20, 22, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 24px; padding: 8px 16px 8px 20px; gap: 14px; border: 1px solid var(--border-color); box-shadow: 0 4px 24px rgba(0,0,0,0.2); transition: border-color 0.3s ease; }
        .input-wrapper:focus-within { border-color: #333336; }
        input[type="text"] { flex: 1; background: transparent; border: none; padding: 8px 0; color: var(--text-heading); font-size: 0.9rem; outline: none; width: 100%; }
        input[type="text"]::placeholder { color: var(--text-muted); }
        .send-btn { background: var(--accent); color: #000; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 6px; width: 28px; height: 28px; transition: transform 0.1s ease; flex-shrink: 0; }
        .send-btn:active { transform: scale(0.9); }
        .send-btn svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2.5; }

        /* Mobile Responsive Overrides */
        @media (max-width: 768px) {
            .desktop-nav-trigger { display: none !important; }
            .mobile-header { display: flex; }
            .sidebar { position: fixed; top: 0; bottom: 0; left: 0; transform: translateX(-100%); width: 260px; box-shadow: 4px 0 24px rgba(0,0,0,0.5); padding: 24px 16px !important; }
            .sidebar.active { transform: translateX(0); }
            .sidebar.collapsed { width: 260px; transform: translateX(-100%); }
            .sidebar.collapsed * { opacity: 1; pointer-events: auto; }
            .sidebar-overlay { display: block; pointer-events: none; }
            .sidebar-overlay.active { opacity: 1; pointer-events: auto; }
            .chat-messages { padding: 20px 16px; gap: 24px; }
            .chat-input-area { padding: 0 16px 16px 16px; }
            .input-wrapper { padding: 6px 12px 6px 16px; }
            .message { font-size: 0.85rem; }
            .code-container pre { padding: 12px; }
        }
    </style>
</head>
<body>

    <div class="desktop-nav-trigger">
        <button class="icon-btn" onclick="toggleDesktopSidebar()" title="Show Sidebar">
            <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
    </div>

    <div class="mobile-header">
        <button class="icon-btn" onclick="toggleMobileSidebar()">
            <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <span class="logo-text">Lora AI</span>
        <button class="icon-btn" onclick="clearActiveChat()">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
    </div>

    <div class="sidebar-overlay" onclick="toggleMobileSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="logo-text">Lora AI</span>
            <div style="display: flex; align-items: center; gap: 8px;">
                <button class="icon-btn desktop-only" onclick="toggleDesktopSidebar()" title="Hide Sidebar" style="width:28px; height:28px;">
                    <svg viewBox="0 0 24 24" style="width:14px; height:14px;"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <button class="new-session-btn" onclick="clearActiveChat()">
                    <svg viewBox="0 0 24 24" width="12" height="12"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    New
                </button>
            </div>
        </div>

        <div class="section-title">Model Core</div>
        <div class="model-switcher-tabs">
            <button id="tierPro" class="tab-btn active" onclick="switchModelTier('pro')">
                <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                Lora Pro
            </button>
        </div>

        <div class="section-title">Mode</div>
        <div class="selector-wrapper">
            <select id="systemModeSelector" class="selector-element" onchange="switchSystemMode()">
                <option value="assistant">Assistant Pipeline</option>
                <option value="developer">Developer Mode</option>
                <option value="creative">Creative Matrix</option>
            </select>
            <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>

        <div class="sidebar-footer">
            <button class="delete-btn" onclick="deleteChatHistory()">
                <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                Delete Chat
            </button>
        </div>
    </div>

    <div class="main-content">
        <div class="chat-messages" id="chatBox">
            <div class="message lora">Workspace ready. Awaiting parameters.</div>
        </div>
        
        <div class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Ask Lora..." onkeydown="if(event.key === 'Enter') dispatchChatMessage()" autofocus autocomplete="off">
                <button class="send-btn" onclick="dispatchChatMessage()">
                    <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://renewal-euphemism-relapsing.ngrok-free.dev";
        
        let activeModelTier = "pro";
        let activeSystemMode = "assistant";
        let chatHistory = [];

        // Desktop Sidebar Toggle
        function toggleDesktopSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }

        // Mobile Sidebar Toggle
        function toggleMobileSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.querySelector('.sidebar-overlay').classList.toggle('active');
        }

        // Auto-close open menu on mobile after selections
        function autoCloseSidebarMobile() {
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('active');
                document.querySelector('.sidebar-overlay').classList.remove('active');
            }
        }

        function switchModelTier(tier) {
            activeModelTier = tier;
            document.getElementById("tierPro").classList.toggle("active", tier === "pro");
            
            const input = document.getElementById("userInput");
            input.placeholder = "Ask Lora...";
            
            autoCloseSidebarMobile();
            if(window.innerWidth > 768) input.focus(); 
        }

        function switchSystemMode() {
            activeSystemMode = document.getElementById("systemModeSelector").value;
            autoCloseSidebarMobile();
        }

        function clearActiveChat() {
            document.getElementById("chatBox").innerHTML = '<div class="message lora">Session context flushed.</div>';
            autoCloseSidebarMobile();
        }

        function deleteChatHistory() {
            chatHistory = []; 
            document.getElementById("chatBox").innerHTML = '<div class="message lora" style="color: var(--text-muted)">Conversation history deleted.</div>';
            autoCloseSidebarMobile();
        }

        function toggleThinking(headerElement) {
            headerElement.parentElement.classList.toggle("collapsed");
        }

        function parseMarkdownAndRender(text, targetElement) {
            targetElement.innerHTML = "";
            let remainingText = text || "";
            
            const thinkMatch = text.match(/<thinking>([\s\S]*?)<\/thinking>/);
            if (thinkMatch) {
                const thinkingText = thinkMatch[1];
                remainingText = text.replace(/<thinking>[\s\S]*?<\/thinking>/, "");
                
                const thinkDiv = document.createElement("div");
                thinkDiv.className = "thinking-block collapsed"; 
                thinkDiv.innerHTML = `
                    <div class="thinking-header" onclick="toggleThinking(this)">
                        <svg viewBox="0 0 24 24" width="10" height="10"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        <span>Thinking Matrix</span>
                    </div>
                    <div class="thinking-body"></div>
                `;
                thinkDiv.querySelector(".thinking-body").innerText = thinkingText;
                targetElement.appendChild(thinkDiv);
            }

            const codeBlockRegex = /```([a-zA-Z0-9+#-]+)?\n([\s\S]*?)```/g;
            let lastIndex = 0;
            let match;

            while ((match = codeBlockRegex.exec(remainingText)) !== null) {
                if (match.index > lastIndex) {
                    const txtSpan = document.createElement("span");
                    txtSpan.textContent = remainingText.substring(lastIndex, match.index);
                    txtSpan.innerHTML = txtSpan.innerHTML.replace(/\n/g, "<br>");
                    targetElement.appendChild(txtSpan);
                }
                
                const lang = match[1] || "code";
                const codeText = match[2].trim();
                const container = document.createElement("div");
                container.className = "code-container";
                container.innerHTML = `
                    <div class="code-header">
                        <span>${lang}</span>
                        <button class="copy-btn" onclick="navigator.clipboard.writeText(this.parentElement.nextElementSibling.innerText); this.innerText='Copied!'; setTimeout(()=>this.innerText='Copy', 2000)">Copy</button>
                    </div>
                    <pre><code></code></pre>
                `;
                container.querySelector("code").textContent = codeText;
                targetElement.appendChild(container);
                lastIndex = codeBlockRegex.lastIndex;
            }

            if (lastIndex < remainingText.length) {
                const txtSpan = document.createElement("span");
                txtSpan.textContent = remainingText.substring(lastIndex);
                txtSpan.innerHTML = txtSpan.innerHTML.replace(/\n/g, "<br>");
                targetElement.appendChild(txtSpan);
            }
        }

        async function dispatchChatMessage() {
            const input = document.getElementById("userInput");
            const chatBox = document.getElementById("chatBox");
            const query = input.value.trim();
            if (!query) return;

            const userDiv = document.createElement("div");
            userDiv.className = "message user";
            userDiv.innerText = query;
            chatBox.appendChild(userDiv);
            input.value = "";
            
            if(window.innerWidth <= 768) input.blur();

            const loraDiv = document.createElement("div");
            loraDiv.className = "message lora";
            loraDiv.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div>';
            chatBox.appendChild(loraDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            chatHistory.push({ role: "user", content: query });

            try {
                const response = await fetch(`${API_BASE}/api/generate`, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "ngrok-skip-browser-warning": "true" 
                    },
                    body: JSON.stringify({ 
                        prompt: query, 
                        model_choice: activeModelTier, 
                        system_memory: `Mode: ${activeSystemMode}`,
                        history: chatHistory 
                    })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.detail || "Execution pipeline severed.");
                }
                
                loraDiv.innerHTML = ""; 
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let accumulatedTokens = "";
                let streamBuffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    streamBuffer += decoder.decode(value, { stream: true });
                    const lines = streamBuffer.split("\n");
                    
                    streamBuffer = lines.pop();
                    
                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (!trimmed) continue;
                        
                        try {
                            const parsed = JSON.parse(trimmed);
                            if (parsed.response) {
                                accumulatedTokens += parsed.response;
                            }
                        } catch (e) {
                            accumulatedTokens += trimmed;
                        }
                    }
                    
                    parseMarkdownAndRender(accumulatedTokens, loraDiv);
                    chatBox.scrollTop = chatBox.scrollHeight;
                }

                if (streamBuffer.trim()) {
                    try {
                        const parsed = JSON.parse(streamBuffer.trim());
                        if (parsed.response) accumulatedTokens += parsed.response;
                    } catch (e) {
                        accumulatedTokens += streamBuffer;
                    }
                    parseMarkdownAndRender(accumulatedTokens, loraDiv);
                }

                chatHistory.push({ role: "assistant", content: accumulatedTokens });
                
            } catch (err) {
                loraDiv.style.color = "#ff453a";
                loraDiv.innerText = `Error: ${err.message}`;
            } finally {
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }
    </script>
</body>
</html>
