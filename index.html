<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lora AI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { 
            background: #000000; 
            color: #ffffff; 
            display: flex; 
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar View Layout */
        .sidebar {
            width: 260px;
            background: #000000;
            border-right: 1px solid #222222;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            gap: 10px;
        }

        /* Lora Logo Container Configuration */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .logo-text {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .new-session-btn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 8px 14px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .new-session-btn:hover {
            background: #cccccc;
        }

        .history-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #666666;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .history-item {
            padding: 12px;
            border: 1px solid #1a1a1a;
            font-size: 0.9rem;
            color: #888888;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s;
        }

        .history-item:hover, .history-item.active {
            background: #111111;
            color: #ffffff;
            border-color: #333333;
        }

        /* Core Interactive Window Pane */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000000;
        }

        .chat-messages { 
            flex: 1; 
            padding: 40px 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 24px;
            max-width: 840px;
            width: 100%;
            margin: 0 auto;
        }

        .message { 
            padding: 16px; 
            max-width: 80%; 
            line-height: 1.5;
            font-size: 0.95rem;
            word-wrap: break-word;
        }
        
        .user { 
            align-self: flex-end; 
            background: #111111;
            color: #ffffff; 
            border: 1px solid #333333; 
        }
        
        .lora { 
            align-self: flex-start; 
            background: #000000;
            color: #ffffff; 
            border: 1px solid #222222;
        }

        /* Attached preview style module logic */
        .preview-inline-img {
            max-width: 200px;
            max-height: 200px;
            display: block;
            margin-bottom: 8px;
            border: 1px solid #444444;
        }
        
        .chat-input-area { 
            padding: 20px; 
            max-width: 840px;
            width: 100%;
            margin: 0 auto 20px auto;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid #333333;
            background: #000000;
            padding: 8px 16px;
            gap: 10px;
        }

        .input-wrapper:focus-within {
            border-color: #555555;
        }

        /* Clean Upload Node Elements */
        .upload-label {
            cursor: pointer;
            padding: 6px;
            color: #888888;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .upload-label:hover {
            color: #ffffff;
        }

        .upload-label svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        #fileUpload {
            display: none;
        }

        input[type="text"] { 
            flex: 1; 
            background: transparent; 
            border: none; 
            padding: 8px 0; 
            color: #ffffff; 
            font-size: 1rem;
            outline: none;
        }
        
        .send-btn { 
            background: transparent; 
            color: #ffffff; 
            border: 1px solid #444444; 
            padding: 8px 20px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s;
        }
        
        .send-btn:hover { 
            background: #ffffff; 
            color: #000000; 
            border-color: #ffffff;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000000; }
        ::-webkit-scrollbar-thumb { background: #222222; }
        ::-webkit-scrollbar-thumb:hover { background: #333333; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo-container">
                <img src="LoraAI Full logo.png" alt="Lora Logo" class="logo-img" onerror="this.style.display='none';">
                <span class="logo-text">Lora</span>
            </div>
            <button class="new-session-btn" onclick="startNewSession()">New</button>
        </div>
        
        <div class="history-title">Chat History</div>
        <ul class="history-list" id="historyList">
            <li class="history-item active" onclick="switchSession(this, 'Welcome Session')">Default Conversation</li>
            <li class="history-item" onclick="switchSession(this, 'UI Adjustments')">UI Adjustments</li>
            <li class="history-item" onclick="switchSession(this, 'Server Configurations')">Server Configurations</li>
        </ul>
    </div>

    <div class="main-content">
        <div class="chat-messages" id="chatBox">
            <div class="message lora">Lora AI is ready. Type your message or upload an image to start chatting.</div>
        </div>
        
        <div class="chat-input-area">
            <div class="input-wrapper">
                <label for="fileUpload" class="upload-label" title="Upload Image">
                    <svg viewBox="0 0 24 24">
                        <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-3.31 2.69-6 6-6s6 2.69 6 6v10.5c0 4.42-3.58 8-8 8s-8-3.58-8-8V6h2v9.5c0 3.31 2.69 6 6 6s6-2.69 6-6V5c0-2.21-1.79-4-4-4s-4 1.79-4 4v12.5c0 1.1.9 2 2 2s2-.9 2-2V6h2z"/>
                    </svg>
                </label>
                <input type="file" id="fileUpload" accept="image/*" onchange="handleImageSelection()">
                
                <input type="text" id="userInput" placeholder="Type a message..." onkeydown="if(event.key === 'Enter') sendTerminalMessage()" autofocus>
                <button class="send-btn" onclick="sendTerminalMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8000/chat";
        let currentSelectedImageBase64 = null;

        function startNewSession() {
            const chatBox = document.getElementById("chatBox");
            chatBox.innerHTML = '<div class="message lora">New session started. How can I help you today?</div>';
            clearSelectedImage();
        }

        function switchSession(element, sessionName) {
            // Manage clean selection tags inside DOM array lists
            document.querySelectorAll('.history-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
            
            const chatBox = document.getElementById("chatBox");
            chatBox.innerHTML = `<div class="message lora">Switched to active workspace tab context: "${sessionName}". History buffer restored.</div>`;
            clearSelectedImage();
        }

        function handleImageSelection() {
            const fileInput = document.getElementById("fileUpload");
            const label = document.querySelector(".upload-label");
            
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                label.style.color = "#00ff66"; // Turn icon green to acknowledge file attachment selection block
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentSelectedImageBase64 = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function clearSelectedImage() {
            document.getElementById("fileUpload").value = "";
            document.querySelector(".upload-label").style.color = "#888888";
            currentSelectedImageBase64 = null;
        }

        async function sendTerminalMessage() {
            const input = document.getElementById("userInput");
            const chatBox = document.getElementById("chatBox");
            const query = input.value.trim();
            
            if (!query && !currentSelectedImageBase64) return;

            const userDiv = document.createElement("div");
            userDiv.className = "message user";
            
            // Inject structural image node if selected beforehand
            if (currentSelectedImageBase64) {
                const imgNode = document.createElement("img");
                imgNode.src = currentSelectedImageBase64;
                imgNode.className = "preview-inline-img";
                userDiv.appendChild(imgNode);
            }
            
            if (query) {
                const textNode = document.createTextNode(query);
                userDiv.appendChild(textNode);
            }
            
            chatBox.appendChild(userDiv);
            
            // Cache payload fields and clear input nodes immediately
            const activeQuery = query;
            const activeImage = currentSelectedImageBase64;
            
            input.value = "";
            clearSelectedImage();
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        message: activeQuery,
                        image: activeImage // Sends image data payload down string line channel if present
                    })
                });

                if (!response.ok) throw new Error(`Status ${response.status}`);

                const data = await response.json();
                
                const loraDiv = document.createElement("div");
                loraDiv.className = "message lora";
                loraDiv.innerText = data.reply;
                chatBox.appendChild(loraDiv);
            } catch (err) {
                const errorDiv = document.createElement("div");
                errorDiv.className = "message lora";
                errorDiv.style.color = "#ff3333";
                errorDiv.style.borderColor = "#ff3333";
                errorDiv.innerText = `Error: Could not connect to the server on port 8000. (${err.message})`;
                chatBox.appendChild(errorDiv);
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
