<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lora AI Core</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: #0b0f19; color: #f3f4f6; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* Glassmorphism UI */
        .chat-container { 
            width: 90%; max-width: 600px; height: 80vh; 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .chat-header { padding: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.08); text-align: center; font-weight: 600; font-size: 1.2rem; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 16px; font-size: 0.95rem; }
        .user { background: rgba(255, 255, 255, 0.1); align-self: flex-end; border-bottom-right-radius: 4px; }
        .lora { background: rgba(59, 130, 246, 0.2); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(59, 130, 246, 0.3); }
        .chat-input-area { padding: 20px; border-top: 1px solid rgba(255, 255, 255, 0.08); display: flex; gap: 12px; }
        input { flex: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 12px 16px; color: white; outline: none; }
        button { background: #3b82f6; color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">Lora AI</div>
        <div class="chat-messages" id="chatBox">
            <div class="message lora">Hello, how can I help you today?</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Type a message..." onkeydown="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById("userInput");
            const chatBox = document.getElementById("chatBox");
            const query = input.value.trim();
            
            if (!query) return;

            // 1. Instantly display user message to verify the code is running
            const userDiv = document.createElement("div");
            userDiv.className = "message user";
            userDiv.innerText = query;
            chatBox.appendChild(userDiv);
            
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch("http://localhost:8000/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: query })
                });

                if (!response.ok) throw new Error("404 or Server Error");
                
                const data = await response.json();
                
                const loraDiv = document.createElement("div");
                loraDiv.className = "message lora";
                loraDiv.innerText = data.reply;
                chatBox.appendChild(loraDiv);
            } catch (err) {
                const errorDiv = document.createElement("div");
                errorDiv.className = "message lora";
                errorDiv.style.color = "#ef4444";
                errorDiv.innerText = "Error: Failed to connect to Lora server core engine.";
                chatBox.appendChild(errorDiv);
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
