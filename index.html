<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lora AI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: monospace; }
        
        body { 
            background: #020402; 
            color: #00ff66; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            overflow: hidden;
        }
        
        /* Rigid Terminal UI Layout with Glow Accents */
        .chat-box { 
            width: 100%; max-width: 950px; height: 90vh;
            background: #050a05; 
            border: 2px solid #00ff66; 
            padding: 20px;
            display: flex; flex-direction: column;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2), inset 0 0 15px rgba(0, 255, 102, 0.1);
        }

        .chat-header { 
            padding-bottom: 12px; 
            border-bottom: 2px dashed #00ff66; 
            margin-bottom: 15px; 
            display: flex; justify-content: space-between; font-weight: bold;
            text-shadow: 0 0 8px rgba(0, 255, 102, 0.6);
        }
        
        .chat-messages { 
            flex: 1; 
            border: 1px solid #00ff66; 
            background: #000200; 
            padding: 20px; 
            overflow-y: scroll; 
            display: flex; flex-direction: column; gap: 14px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8);
        }

        /* Message Elements with Distinctive Neon Glows */
        .message { 
            padding: 12px; 
            max-width: 85%; 
            word-break: break-all; 
            line-height: 1.5;
            background: #030703;
        }
        
        .user { 
            align-self: flex-end; 
            color: #ffffff; 
            border: 1px solid #ffffff; 
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }
        
        .lora { 
            align-self: flex-start; 
            color: #00ff66; 
            border: 1px solid #00ff66; 
            box-shadow: 0 0 8px rgba(0, 255, 102, 0.3);
        }
        
        .chat-input-area { margin-top: 15px; display: flex; gap: 12px; }

        /* Input Controls with Focus Glows */
        input { 
            flex: 1; 
            background: #000000; 
            border: 1px solid #00ff66; 
            padding: 14px; 
            color: #00ff66; 
            font-family: monospace; 
            font-size: 1rem;
            transition: box-shadow 0.2s, border-color 0.2s;
        }
        
        input:focus { 
            background: #020502; 
            outline: none; 
            border-color: #ffffff;
            box-shadow: 0 0 12px rgba(0, 255, 102, 0.5);
        }
        
        button { 
            background: #00ff66; 
            color: #000000; 
            border: none; 
            padding: 0 30px; 
            font-weight: bold; 
            cursor: pointer; 
            font-family: monospace; 
            text-transform: uppercase; 
            font-size: 1rem;
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.4);
            transition: all 0.2s;
        }
        
        button:hover { 
            background: #ffffff; 
            color: #000000; 
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
        }
        
        .status-indicator { display: flex; align-items: center; gap: 6px; }
        .blink-dot { width: 8px; height: 8px; background: #00ff66; border-radius: 50%; animation: pulse 1.5s infinite; box-shadow: 0 0 8px #00ff66; }
        
        @keyframes pulse { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
        
        .chat-messages::-webkit-scrollbar { width: 8px; }
        .chat-messages::-webkit-scrollbar-track { background: #000200; }
        .chat-messages::-webkit-scrollbar-thumb { background: #00ff66; border: 1px solid #050a05; }
    </style>
</head>
<body>

    <div class="chat-box">
        <div class="chat-header">
            <div>LORA AI</div>
            <div class="status-indicator">
                <div class="blink-dot"></div>
                <span>CONNECTED</span>
            </div>
        </div>
        
        <div class="chat-messages" id="chatBox">
            <div class="message lora">Lora AI is ready. Type your message below to start chatting.</div>
        </div>
        
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Type a message..." onkeydown="if(event.key === 'Enter') sendTerminalMessage()" autofocus>
            <button onclick="sendTerminalMessage()">Send</button>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8000/chat";

        async function sendTerminalMessage() {
            const input = document.getElementById("userInput");
            const chatBox = document.getElementById("chatBox");
            const query = input.value.trim();
            
            if (!query) return;

            // Display user message
            const userDiv = document.createElement("div");
            userDiv.className = "message user";
            userDiv.innerText = `You: ${query}`;
            chatBox.appendChild(userDiv);
            
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: query })
                });

                if (!response.ok) throw new Error(`Status ${response.status}`);

                const data = await response.json();
                
                const loraDiv = document.createElement("div");
                loraDiv.className = "message lora";
                loraDiv.innerText = `Lora: ${data.reply}`;
                chatBox.appendChild(loraDiv);
            } catch (err) {
                const errorDiv = document.createElement("div");
                errorDiv.className = "message lora";
                errorDiv.style.color = "#ff3333";
                errorDiv.style.borderColor = "#ff3333";
                errorDiv.style.boxShadow = "0 0 8px rgba(255, 51, 51, 0.4)";
                errorDiv.innerText = `Error: Could not connect to the server on port 8000. (${err.message})`;
                chatBox.appendChild(errorDiv);
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
