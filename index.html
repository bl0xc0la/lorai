<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lora AI</title>
    <style>
        :root {
            --bg-main: #000000;
            --bg-sidebar: #0d0d0d;
            --border-color: #1a1a1a;
            --text-main: #ececec;
            --text-muted: #b4b4b4;
            --text-heading: #ffffff;
            --btn-secondary: #1a1a1a;
            --btn-secondary-border: #333333;
            --user-bubble: #2f2f2f;
            --input-bg: #1d1d1d;
            --send-btn-bg: #ffffff;
            --send-btn-txt: #000000;
            --code-bg: #1e1e1e;
            --code-header: #2d2d2d;
            --accent-color: #4285f4;
        }

        [data-theme="light"] {
            --bg-main: #ffffff;
            --bg-sidebar: #f3f3f3;
            --border-color: #e5e5e5;
            --text-main: #2f2f2f;
            --text-muted: #666666;
            --text-heading: #000000;
            --btn-secondary: #e5e5e5;
            --btn-secondary-border: #cccccc;
            --user-bubble: #f0f0f0;
            --input-bg: #f4f4f4;
            --send-btn-bg: #000000;
            --send-btn-txt: #ffffff;
            --code-bg: #f8f8f8;
            --code-header: #e1e1e1;
            --accent-color: #1a73e8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; transition: background-color 0.2s, color 0.2s; }
        body { background: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Security 2FA Overlay Frame screen */
        .auth-overlay { position: fixed; top:0; left:0; width:100vw; height:100vh; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); display:flex; align-items:center; justify-content:center; z-index:9999; }
        .auth-card { background: #0d0d0d; border: 1px solid #222; padding: 32px; border-radius: 14px; width: 360px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        .auth-input { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 1.2rem; letter-spacing: 4px; text-align: center; margin: 18px 0; outline: none; }
        .auth-btn { width: 100%; padding: 12px; background: #fff; color: #000; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; }

        /* Sidebar View Layout */
        .sidebar { width: 260px; background: var(--bg-sidebar); display: flex; flex-direction: column; padding: 16px; border-right: 1px solid var(--border-color); }
        .sidebar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .logo-text { font-size: 1.1rem; font-weight: 600; color: var(--text-heading); }
        
        .controls-group { display: flex; gap: 6px; }
        .theme-toggle-btn, .new-session-btn { background: var(--btn-secondary); border: 1px solid var(--btn-secondary-border); color: var(--text-heading); padding: 6px; border-radius: 8px; cursor: pointer; }
        
        .section-title { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); margin: 14px 0 8px 0; font-weight: 600; padding-left: 4px; letter-spacing: 0.5px; }
        
        /* Dropdowns & Selectors styling elements built to 14px specifications */
        .model-switcher-tabs { display: flex; background: var(--input-bg); padding: 4px; border-radius: 14px; border: 1px solid var(--border-color); margin-bottom: 12px; }
        .tab-btn { flex: 1; padding: 8px; border-radius: 10px; border: none; font-size: 0.85rem; font-weight: 600; cursor: pointer; background: transparent; color: var(--text-muted); }
        .tab-btn.active { background: var(--send-btn-bg); color: var(--send-btn-txt); }

        .selector-element { width: 100%; background: var(--input-bg); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 14px; padding: 10px; cursor: pointer; outline: none; font-size: 0.9rem; }

        .history-list { flex: 1; overflow-y: auto; list-style: none; display: flex; flex-direction: column; gap: 2px; margin-top: 10px; }
        .history-item { padding: 10px 12px; border-radius: 8px; font-size: 0.9rem; color: var(--text-muted); cursor: pointer; }
        .history-item.active { background: var(--btn-secondary); color: var(--text-heading); }

        /* Main Chat Panel Screen Canvas */
        .main-content { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; max-width: 760px; width: 100%; margin: 0 auto; }
        .message { padding: 12px 16px; max-width: 90%; line-height: 1.6; font-size: 0.95rem; border-radius: 18px; color: var(--text-main); }
        .user { align-self: flex-end; background: var(--user-bubble); border-bottom-right-radius: 4px; }
        .lora { align-self: flex-start; background: transparent; padding-left: 0; max-width: 100%; }

        /* Thinking Animation Container */
        .thinking-dots { display: inline-flex; align-items: center; gap: 4px; padding: 8px 4px; }
        .thinking-dots span { width: 8px; height: 8px; background-color: var(--text-muted); border-radius: 50%; animation: bounceThinkingDot 1.4s infinite ease-in-out both; }
        .thinking-dots span:nth-child(1) { animation-delay: -0.32s; }
        .thinking-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounceThinkingDot { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }

        /* Code Block Visualization Styling components */
        .code-container { background: var(--code-bg); border-radius: 8px; margin: 12px 0; overflow: hidden; border: 1px solid var(--border-color); }
        .code-header { background: var(--code-header); padding: 8px 16px; display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-muted); }
        .copy-btn { background: var(--user-bubble); color: var(--text-main); border: 1px solid var(--border-color); padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        .code-container pre { padding: 16px; overflow-x: auto; }
        .code-container code { font-family: monospace; color: #9cdcfe; font-size: 0.9rem; }

        .chat-input-area { padding: 0 20px 24px 20px; max-width: 760px; width: 100%; margin: 0 auto; }
        .input-wrapper { display: flex; align-items: center; background: var(--input-bg); border-radius: 26px; padding: 6px 12px 6px 18px; gap: 12px; }
        input[type="text"] { flex: 1; background: transparent; border: none; padding: 12px 0; color: var(--text-heading); font-size: 1rem; outline: none; }
        .send-btn { background: var(--send-btn-bg); color: var(--send-btn-txt); border: none; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

    <div class="auth-overlay" id="authGate">
        <div class="auth-card">
            <h2 style="color:#fff; margin-bottom: 8px;">2FA Required</h2>
            <p style="color:#888; font-size:0.9rem;">Open Google Authenticator and type the verification code.</p>
            <input type="text" id="totpField" class="auth-input" placeholder="000000" maxlength="6">
            <button class="auth-btn" onclick="submitTwoFactorToken()">Verify Identity</button>
            <p id="authError" style="color:#ff3333; font-size:0.85rem; margin-top:12px; display:none;">Invalid token code</p>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <span class="logo-text">Lora AI</span>
            <div class="controls-group">
                <button class="theme-toggle-btn" onclick="toggleColorTheme()">🌓</button>
                <button class="new-session-btn" onclick="clearActiveChat()">New</button>
            </div>
        </div>

        <div class="section-title">Model Tier</div>
        <div class="model-switcher-tabs">
            <button id="tierSpeed" class="tab-btn active" onclick="switchModelTier('speed')">⚡ Speed</button>
            <button id="tierPro" class="tab-btn" onclick="switchModelTier('pro')">✨ Pro</button>
        </div>

        <div class="section-title">System Core Mode</div>
        <select id="systemModeSelector" class="selector-element" onchange="switchSystemMode()">
            <option value="assistant">Standard Assistant</option>
            <option value="developer">Advanced Code Engineer</option>
            <option value="creative">Creative Context Engine</option>
        </select>

        <div class="section-title">Recent Chats</div>
        <ul class="history-list">
            <li class="history-item active">Default Conversation Thread</li>
        </ul>
    </div>

    <div class="main-content">
        <div class="chat-messages" id="chatBox">
            <div class="message lora">Authentication clear. Lora AI active tier initialized. Ask anything!</div>
        </div>
        
        <div class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Message Lora..." onkeydown="if(event.key === 'Enter') dispatchChatMessage()">
                <button class="send-btn" onclick="dispatchChatMessage()">➔</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:8000";
        let activeModelTier = "speed";
        let activeSystemMode = "assistant";

        async function submitTwoFactorToken() {
            const tokenVal = document.getElementById("totpField").value.trim();
            const errLabel = document.getElementById("authError");
            
            try {
                const res = await fetch(`${API_BASE}/verify-2fa`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: tokenVal })
                });
                
                if(res.ok) {
                    document.getElementById("authGate").style.display = "none";
                    document.getElementById("userInput").focus();
                } else {
                    throw new Error();
                }
            } catch(e) {
                errLabel.style.display = "block";
            }
        }

        function switchModelTier(tier) {
            activeModelTier = tier;
            document.getElementById("tierSpeed").classList.toggle("active", tier === "speed");
            document.getElementById("tierPro").classList.toggle("active", tier === "pro");
        }

        function switchSystemMode() {
            activeSystemMode = document.getElementById("systemModeSelector").value;
        }

        function toggleColorTheme() {
            const current = document.documentElement.getAttribute("data-theme");
            document.documentElement.setAttribute("data-theme", current === "light" ? "dark" : "light");
        }

        function clearActiveChat() {
            document.getElementById("chatBox").innerHTML = '<div class="message lora">Session refreshed. Ready for input.</div>';
        }

        function parseMarkdownAndRender(text, targetElement) {
            targetElement.innerHTML = "";
            const codeBlockRegex = /```([a-zA-Z0-9+#-]+)?([\s\S]*?)```/g;
            let lastIndex = 0;
            let match;

            while ((match = codeBlockRegex.exec(text)) !== null) {
                if (match.index > lastIndex) {
                    const txtSpan = document.createElement("span");
                    txtSpan.innerText = text.substring(lastIndex, match.index);
                    targetElement.appendChild(txtSpan);
                }

                const lang = match[1] || "code";
                const codeText = match[2].trim();
                const container = document.createElement("div");
                container.className = "code-container";
                container.innerHTML = `
                    <div class="code-header"><span>${lang}</span><button class="copy-btn" onclick="navigator.clipboard.writeText(this.parentElement.nextElementSibling.innerText); this.innerText='Copied!'; setTimeout(()=>this.innerText='Copy', 2000)">Copy</button></div>
                    <pre><code>${codeText}</code></pre>
                `;
                targetElement.appendChild(container);
                lastIndex = codeBlockRegex.lastIndex;
            }

            if (lastIndex < text.length) {
                const txtSpan = document.createElement("span");
                txtSpan.innerText = text.substring(lastIndex);
                targetElement.appendChild(txtSpan);
            }
        }

        async function dispatchChatMessage() {
            const input = document.getElementById("userInput");
            const chatBox = document.getElementById("chatBox");
            const query = input.value.trim();
            if (!query) return;

            const userDiv = document.createElement("div");
            userDiv.className = "message user";
            userDiv.innerText = query;
            chatBox.appendChild(userDiv);
            
            input.value = "";
            
            const loraDiv = document.createElement("div");
            loraDiv.className = "message lora";
            loraDiv.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div>';
            chatBox.appendChild(loraDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        message: query, 
                        model_tier: activeModelTier, 
                        system_mode: activeSystemMode 
                    })
                });

                if (!response.ok) throw new Error();

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let accumulatedText = "";
                let firstToken = false;

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    if (!firstToken) { loraDiv.innerHTML = ""; firstToken = true; }
                    accumulatedText += decoder.decode(value, { stream: true });
                    parseMarkdownAndRender(accumulatedText, loraDiv);
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            } catch (err) {
                loraDiv.style.color = "#ff3333";
                loraDiv.innerText = "Error linking to backend execution pipeline.";
            }
        }
    </script>
</body>
</html>
