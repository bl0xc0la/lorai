<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lora AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/mono.css">
    <style>
        :root {
            --bg-main: #141416;
            --bg-sidebar: #19191b;
            --border-color: #242427;
            --text-main: #c4c4c7;
            --text-muted: #6e6e73;
            --text-heading: #ffffff;
            --btn-secondary: #1e1e21;
            --user-bubble: #1e1e21;
            --input-bg: #1c1c1f;
            --send-btn-bg: #ffffff;
            --send-btn-txt: #000000;
            --code-bg: #0b0b0c;
            --code-header: #141416;
            --accent-color: #e28743;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Geist Mono", monospace; }
        body { background: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }

        /* Security 2FA Overlay Frame */
        .auth-overlay { position: fixed; top:0; left:0; width:100vw; height:100vh; background: rgba(10, 10, 11, 0.98); display:flex; align-items:center; justify-content:center; z-index:9999; }
        .auth-card { background: var(--bg-sidebar); border: 1px solid var(--border-color); padding: 40px 32px; border-radius: 8px; width: 380px; text-align: center; }
        .auth-input { width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-heading); font-size: 1.4rem; letter-spacing: 6px; text-align: center; margin: 24px 0; outline: none; }
        .auth-btn { width: 100%; padding: 14px; background: var(--send-btn-bg); color: var(--send-btn-txt); font-weight: 600; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
        .qr-link { display: inline-block; color: var(--text-muted); font-size: 0.8rem; margin-top: 16px; text-decoration: none; cursor: pointer; }
        .qr-link:hover { color: var(--text-main); }
        .qr-container { display: none; margin-top: 20px; padding: 12px; background: #ffffff; border-radius: 6px; inline-size: max-content; margin-left: auto; margin-right: auto; }

        /* Claude/OpenCode Decluttered Workspace Layout */
        .sidebar { width: 250px; background: var(--bg-sidebar); display: flex; flex-direction: column; padding: 24px 16px; border-right: 1px solid var(--border-color); }
        .sidebar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
        .logo-text { font-size: 1rem; font-weight: 600; color: var(--text-heading); letter-spacing: -0.5px; }
        
        .new-session-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; display: flex; align-items: center; gap: 6px; }
        .new-session-btn:hover { background: var(--btn-secondary); }
        
        .section-title { font-size: 0.65rem; text-transform: uppercase; color: var(--text-muted); margin: 20px 0 8px 4px; font-weight: 700; letter-spacing: 1px; }
        
        .model-switcher-tabs { display: flex; flex-direction: column; gap: 2px; margin-bottom: 12px; }
        .tab-btn { width: 100%; text-align: left; padding: 8px 10px; border-radius: 6px; border: none; font-size: 0.8rem; cursor: pointer; background: transparent; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
        .tab-btn:hover { color: var(--text-main); }
        .tab-btn.active { background: var(--btn-secondary); color: var(--text-heading); }
        .tab-btn svg { width: 14px; height: 14px; fill: currentColor; }

        .selector-wrapper { position: relative; width: 100%; }
        .selector-element { width: 100%; background: transparent; color: var(--text-main); border: 1px solid var(--border-color); border-radius: 6px; padding: 8px 12px; cursor: pointer; outline: none; font-size: 0.8rem; appearance: none; -webkit-appearance: none; }
        .selector-wrapper svg { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 10px; height: 10px; fill: var(--text-muted); pointer-events: none; }

        .history-list { flex: 1; overflow-y: auto; list-style: none; display: flex; flex-direction: column; gap: 2px; }
        .history-item { padding: 8px 10px; border-radius: 6px; font-size: 0.8rem; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .history-item.active { color: var(--text-main); }
        .history-item svg { width: 14px; height: 14px; fill: currentColor; }

        /* Minimal Chat Panel Displays */
        .main-content { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); }
        .chat-messages { flex: 1; padding: 40px 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 28px; max-width: 800px; width: 100%; margin: 0 auto; }
        
        .message { max-width: 88%; line-height: 1.6; font-size: 0.9rem; color: var(--text-main); display: flex; flex-direction: column; animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }
        
        .user { align-self: flex-end; background: var(--user-bubble); padding: 12px 16px; border-radius: 8px; color: var(--text-heading); border: 1px solid var(--border-color); }
        .lora { align-self: flex-start; background: transparent; width: 100%; }

        /* Claude-like Think Expandable Component Layout */
        .thinking-block { background: rgba(255, 255, 255, 0.01); border-left: 1px solid var(--border-color); padding: 6px 14px; margin-bottom: 14px; font-size: 0.8rem; }
        .thinking-header { cursor: pointer; display: flex; align-items: center; gap: 6px; font-weight: 500; color: var(--text-muted); user-select: none; }
        .thinking-header svg { width: 10px; height: 10px; fill: currentColor; transform: rotate(90deg); transition: transform 0.15s ease; }
        .thinking-block.collapsed .thinking-header svg { transform: rotate(0deg); }
        .thinking-block.collapsed .thinking-body { display: none; }
        .thinking-body { padding-top: 6px; line-height: 1.5; color: var(--text-muted); }

        .thinking-dots { display: inline-flex; align-items: center; gap: 4px; padding: 8px 0; }
        .thinking-dots span { width: 4px; height: 4px; background-color: var(--text-muted); border-radius: 50%; animation: bounceThinkingDot 1.4s infinite ease-in-out both; }
        .thinking-dots span:nth-child(1) { animation-delay: -0.32s; }
        .thinking-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounceThinkingDot { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }

        /* Clean Flat Code Block Structures */
        .code-container { background: var(--code-bg); border-radius: 6px; margin: 14px 0; overflow: hidden; border: 1px solid var(--border-color); }
        .code-header { background: var(--code-header); padding: 8px 14px; display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-muted); border-bottom: 1px solid var(--border-color); }
        .copy-btn { background: transparent; color: var(--text-muted); border: 1px solid var(--border-color); padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
        .copy-btn:hover { color: var(--text-main); }
        .code-container pre { padding: 14px; overflow-x: auto; margin: 0; }
        .code-container code { font-family: "Geist Mono", monospace; color: #a5d6ff; font-size: 0.85rem; }

        .chat-input-area { padding: 0 40px 32px 40px; max-width: 800px; width: 100%; margin: 0 auto; }
        .input-wrapper { display: flex; align-items: center; background: var(--input-bg); border-radius: 8px; padding: 6px 12px 6px 14px; gap: 12px; border: 1px solid var(--border-color); }
        input[type="text"] { flex: 1; background: transparent; border: none; padding: 8px 0; color: var(--text-heading); font-size: 0.9rem; outline: none; }
        input[type="text"]::placeholder { color: var(--text-muted); }
        .send-btn { background: transparent; color: var(--text-muted); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 4px; }
        .send-btn:hover { color: var(--text-heading); }
        .send-btn svg { width: 16px; height: 16px; fill: currentColor; }
    </style>
</head>
<body>

    <!-- 2FA Gatekeeper Layer -->
    <div class="auth-overlay" id="authGate">
        <div class="auth-card">
            <h2 style="color: var(--text-heading); font-size: 1.1rem; font-weight: 600; margin-bottom: 6px;">Security Verification</h2>
            <p style="color: var(--text-muted); font-size: 0.8rem;">Input the validation token to unlock workspace environment.</p>
            <input type="text" id="totpField" class="auth-input" placeholder="000000" maxlength="6">
            <button class="auth-btn" onclick="submitTwoFactorToken()">Verify Identity</button>
            <p id="authError" style="color: #ff453a; font-size: 0.8rem; margin-top: 14px; display: none;">Invalid verification matrix hash.</p>
            <span class="qr-link" onclick="revealSetupQr()">Request token configuration engine link</span>
            <div class="qr-container" id="qrContainer"><img id="qrImg" src="" alt="2FA Registration Matrix"></div>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <span class="logo-text">Lora AI</span>
            <button class="new-session-btn" onclick="clearActiveChat()">
                <svg viewBox="0 0 16 16" width="12" height="12"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0-1A6 6 0 1 0 8 2a6 6 0 0 0 0 12zm.5-8.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3a.5.5 0 0 1 1 0z" fill="currentColor"/></svg>
                New
            </button>
        </div>

        <div class="section-title">Model Layer</div>
        <div class="model-switcher-tabs">
            <button id="tierSpeed" class="tab-btn active" onclick="switchModelTier('speed')">
                <svg viewBox="0 0 16 16"><path d="M11.251.068a.5.5 0 0 1 .227.58L9.677 6.5H13a.5.5 0 0 1 .364.843l-8 8.5a.5.5 0 0 1-.842-.49L6.323 9.5H3a.5.5 0 0 1-.364-.843l8-8.5a.5.5 0 0 1 .615-.09zM4.157 8.5H7.5a.5.5 0 0 1 .478.647L6.61 13.62l5.233-5.56H8.5a.5.5 0 0 1-.478-.647L9.39 2.38 4.157 8.5z"/></svg>
                Lora Speed
            </button>
            <button id="tierPro" class="tab-btn" onclick="switchModelTier('pro')">
                <svg viewBox="0 0 16 16"><path d="M8 0a.5.5 0 0 1 .5.5v11.793l3.146-3.147a.5.5 0 0 1 .708.708l-4 4a.5.5 0 0 1-.708 0l-4-4a.5.5 0 1 1 .708-.708L7.5 12.293V.5A.5.5 0 0 1 8 0z" transform="rotate(180 8 8)"/></svg>
                Lora Pro
            </button>
            <button id="tierImages" class="tab-btn" onclick="switchModelTier('images')">
                <svg viewBox="0 0 16 16"><path d="M4.502 9a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z"/><path d="M14.002 13a2 2 0 0 1-2 2h-8a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8zM3.002 5v4.586l2.146-2.147a.5.5 0 0 1 .708 0l3.646 3.646 1.146-1.146a.5.5 0 0 1 .708 0l1.646 1.646V5a1 1 0 0 0-1-1h-8a1 1 0 0 0-1 1zm9 8v-1.793l-1.646-1.646-1.146 1.146a.5.5 0 0 1-.708 0L4.856 7.053 3.002 8.907V13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1z"/></svg>
                Lora Images
            </button>
        </div>

        <div class="section-title">Core Mode</div>
        <div class="selector-wrapper">
            <select id="systemModeSelector" class="selector-element" onchange="switchSystemMode()">
                <option value="assistant">Assistant</option>
                <option value="developer">Developer</option>
                <option value="creative">Creative</option>
            </select>
            <svg viewBox="0 0 10 10"><path d="M1 3.5l4 4 4-4z"/></svg>
        </div>

        <div class="section-title">Threads</div>
        <ul class="history-list">
            <li class="history-item active">
                <svg viewBox="0 0 16 16"><path d="M2 1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H2zm12 1v3H2V2h12zM2 6h12v8H2V6z"/></svg>
                Active Session
            </li>
        </ul>
    </div>

    <div class="main-content">
        <div class="chat-messages" id="chatBox">
            <div class="message lora">Workspace ready. Select architecture pipeline target.</div>
        </div>
        
        <div class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Ask Lora..." onkeydown="if(event.key === 'Enter') dispatchChatMessage()">
                <button class="send-btn" onclick="dispatchChatMessage()">
                    <svg viewBox="0 0 16 16"><path d="M15.854.146a.5.5 0 0 1 .11.525l-5.5 15a.5.5 0 0 1-.94-.154l-1.97-5.91-5.91-1.97a.5.5 0 0 1-.154-.94l15-5.5a.5.5 0 0 1 .525.11zm-6.62 10.234l1.373 4.12 3.864-10.54-10.54 3.864 4.12 1.373 1.183 1.183z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:8000";
        let activeModelTier = "speed";
        let activeSystemMode = "assistant";

        async function submitTwoFactorToken() {
            const tokenVal = document.getElementById("totpField").value.trim();
            const errLabel = document.getElementById("authError");
            try {
                const res = await fetch(`${API_BASE}/verify-2fa`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: tokenVal })
                });
                if(res.ok) {
                    document.getElementById("authGate").style.display = "none";
                    document.getElementById("userInput").focus();
                } else { throw new Error(); }
            } catch(e) { errLabel.style.display = "block"; }
        }

        function revealSetupQr() {
            const container = document.getElementById("qrContainer");
            const img = document.getElementById("qrImg");
            img.src = `${API_BASE}/setup-2fa?t=${new Date().getTime()}`;
            container.style.display = "block";
        }

        function switchModelTier(tier) {
            activeModelTier = tier;
            document.getElementById("tierSpeed").classList.toggle("active", tier === "speed");
            document.getElementById("tierPro").classList.toggle("active", tier === "pro");
            document.getElementById("tierImages").classList.toggle("active", tier === "images");
        }

        function switchSystemMode() {
            activeSystemMode = document.getElementById("systemModeSelector").value;
        }

        function clearActiveChat() {
            document.getElementById("chatBox").innerHTML = '<div class="message lora">Session reset clean.</div>';
        }

        function toggleThinking(headerElement) {
            headerElement.parentElement.classList.toggle("collapsed");
        }

        function parseMarkdownAndRender(text, targetElement) {
            targetElement.innerHTML = "";
            
            let thinkingText = "";
            let remainingText = text;
            const thinkMatch = text.match(/<thinking>([\s\S]*?)<\/thinking>/);
            
            if (thinkMatch) {
                thinkingText = thinkMatch[1];
                remainingText = text.replace(/<thinking>[\s\S]*?<\/thinking>/, "");
                
                const thinkDiv = document.createElement("div");
                thinkDiv.className = "thinking-block";
                thinkDiv.innerHTML = `
                    <div class="thinking-header" onclick="toggleThinking(this)">
                        <svg viewBox="0 0 10 10" width="8" height="8"><path d="M2 1l5 4-5 4z" fill="currentColor"/></svg>
                        <span>Thinking Process</span>
                    </div>
                    <div class="thinking-body">${thinkingText}</div>
                `;
                targetElement.appendChild(thinkDiv);
            }

            const codeBlockRegex = /```([a-zA-Z0-9+#-]+)?([\s\S]*?)```/g;
            let lastIndex = 0;
            let match;

            while ((match = codeBlockRegex.exec(remainingText)) !== null) {
                if (match.index > lastIndex) {
                    const txtSpan = document.createElement("span");
                    txtSpan.innerText = remainingText.substring(lastIndex, match.index);
                    targetElement.appendChild(txtSpan);
                }
                const lang = match[1] || "code";
                const codeText = match[2].trim();
                const container = document.createElement("div");
                container.className = "code-container";
                container.innerHTML = `
                    <div class="code-header"><span>${lang}</span><button class="copy-btn" onclick="navigator.clipboard.writeText(this.parentElement.nextElementSibling.innerText); this.innerText='Copied'; setTimeout(()=>this.innerText='Copy', 2000)">Copy</button></div>
                    <pre><code>${codeText}</code></pre>
                `;
                targetElement.appendChild(container);
                lastIndex = codeBlockRegex.lastIndex;
            }

            if (lastIndex < remainingText.length) {
                const txtSpan = document.createElement("span");
                txtSpan.innerText = remainingText.substring(lastIndex);
                targetElement.appendChild(txtSpan);
            }
        }

        async function dispatchChatMessage() {
            const input = document.getElementById("userInput");
            const chatBox = document.getElementById("chatBox");
            const query = input.value.trim();
            if (!query) return;

            const userDiv = document.createElement("div");
            userDiv.className = "message user";
            userDiv.innerText = query;
            chatBox.appendChild(userDiv);
            input.value = "";
            
            const loraDiv = document.createElement("div");
            loraDiv.className = "message lora";
            loraDiv.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div>';
            chatBox.appendChild(loraDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        message: query, 
                        model_tier: activeModelTier, 
                        system_mode: activeSystemMode 
                    })
                });

                if (!response.ok) throw new Error();
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let accumulatedText = "";
                let firstToken = false;

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    if (!firstToken) { loraDiv.innerHTML = ""; firstToken = true; }
                    accumulatedText += decoder.decode(value, { stream: true });
                    parseMarkdownAndRender(accumulatedText, loraDiv);
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            } catch (err) {
                loraDiv.style.color = "#ff453a";
                loraDiv.innerText = "Error linking to backend execution pipeline.";
            }
        }
    </script>
</body>
</html>
