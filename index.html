<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lora AI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        
        body { 
            background: #000000; 
            color: #ffffff; 
            display: flex; 
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Layout */
        .sidebar {
            width: 260px;
            background: #000000;
            border-right: 1px solid #222222;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .new-session-btn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 6px 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }

        .new-session-btn:hover {
            background: #cccccc;
        }

        .history-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #666666;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }

        .history-item {
            padding: 10px;
            border: 1px solid #222222;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #aaaaaa;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item:hover {
            background: #111111;
            color: #ffffff;
            border-color: #444444;
        }

        /* Main Chat Container */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000000;
        }

        .chat-messages { 
            flex: 1; 
            padding: 40px 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 24px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        .message { 
            padding: 16px; 
            max-width: 85%; 
            line-height: 1.5;
            font-size: 0.95rem;
        }
        
        .user { 
            align-self: flex-end; 
            background: #111111;
            color: #ffffff; 
            border: 1px solid #333333; 
        }
        
        .lora { 
            align-self: flex-start; 
            background: #000000;
            color: #ffffff; 
            border: 1px solid #222222;
        }
        
        .chat-input-area { 
            padding: 20px; 
            max-width: 800px;
            width: 100%;
            margin: 0 auto 20px auto;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid #333333;
            background: #000000;
            padding: 8px 16px;
        }

        .input-wrapper:focus-within {
            border-color: #666666;
        }

        /* Custom File Upload Styling */
        .upload-label {
            cursor: pointer;
            padding: 8px;
            color: #888888;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
            font-size: 1.1rem;
        }

        .upload-label:hover {
            color: #ffffff;
        }

        #fileUpload {
            display: none;
        }

        input[type="text"] { 
            flex: 1; 
            background: transparent; 
            border: none; 
            padding: 10px; 
            color: #ffffff; 
            font-size: 1rem;
            outline: none;
        }
        
        .send-btn { 
            background: transparent; 
            color: #ffffff; 
            border: 1px solid #444444; 
            padding: 8px 20px; 
            font-weight: 600; 
            cursor: pointer; 
        }
        
        .send-btn:hover { 
            background: #ffffff; 
            color: #000000; 
            border-color: #ffffff;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000000; }
        ::-webkit-scrollbar-thumb { background: #333333; }
        ::-webkit-scrollbar-thumb:hover { background: #555555; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo">LORA AI</div>
            <button class="new-session-btn" onclick="startNewSession()">New</button>
        </div>
        
        <div class="history-title">Chat History</div>
        <ul class="history-list" id="historyList">
            <li class="history-item" onclick="loadHistoryItem(this)">Example previous chat topic...</li>
            <li class="history-item" onclick="loadHistoryItem(this)">Python script debug logs</li>
            <li class="history-item" onclick="loadHistoryItem(this)">UI adjustment settings</li>
        </ul>
    </div>

    <div class="main-content">
        <div class="chat-messages" id="chatBox">
            <div class="message lora">Lora AI is ready. Type your message or upload an image to start chatting.</div>
        </div>
        
        <div class="chat-input-area">
            <div class="input-wrapper">
                <label for="fileUpload" class="upload-label" title="Upload Image">📎</label>
                <input type="file" id="fileUpload" accept="image/*" onchange="handleImageSelection()">
                
                <input type="text" id="userInput" placeholder="Type a message..." onkeydown="if(event.key === 'Enter') sendTerminalMessage()" autofocus>
                <button class="send-btn" onclick="sendTerminalMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8000/chat";

        function startNewSession() {
            const chatBox = document.getElementById("chatBox");
            chatBox.innerHTML = '<div class="message lora">New session started. How can I help you?</div>';
        }

        function loadHistoryItem(element) {
            alert(`Loading item: "${element.innerText}"`);
        }

        function handleImageSelection() {
            const fileInput = document.getElementById("fileUpload");
            if(fileInput.files.length > 0) {
                alert(`Selected image: ${fileInput.files[0].name}`);
                // Add your image upload/processing logic here if needed
            }
        }

        async function sendTerminalMessage() {
            const input = document.getElementById("userInput");
            const chatBox = document.getElementById("chatBox");
            const query = input.value.trim();
            
            if (!query) return;

            // Display user message
            const userDiv = document.createElement("div");
            userDiv.className = "message user";
            userDiv.innerText = query;
            chatBox.appendChild(userDiv);
            
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: query })
                });

                if (!response.ok) throw new Error(`Status ${response.status}`);

                const data = await response.json();
                
                const loraDiv = document.createElement("div");
                loraDiv.className = "message lora";
                loraDiv.innerText = data.reply;
                chatBox.appendChild(loraDiv);
            } catch (err) {
                const errorDiv = document.createElement("div");
                errorDiv.className = "message lora";
                errorDiv.style.color = "#ff3333";
                errorDiv.style.borderColor = "#ff3333";
                errorDiv.innerText = `Error: Could not connect to the server on port 8000. (${err.message})`;
                chatBox.appendChild(errorDiv);
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
