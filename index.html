<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lora AI Core</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: monospace; }
        body { background: #000000; color: #00ff00; padding: 20px; }
        
        /* Strict Hard-Edged UI Components */
        .panel { 
            background: #111111; 
            border: 2px solid #00ff00; 
            padding: 20px;
            margin: 0 auto;
        }

        /* Chat Layout */
        .chat-container { width: 100%; max-width: 800px; height: 85vh; display: flex; flex-direction: column; }
        .chat-header { padding-bottom: 10px; border-bottom: 2px solid #00ff00; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .chat-messages { flex: 1; border: 1px solid #00ff00; background: #050505; padding: 15px; overflow-y: scroll; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 8px; border: 1px dotted #00ff00; max-width: 85%; word-break: break-all; }
        .user { align-self: flex-end; background: #112211; color: #ffffff; border-color: #ffffff; }
        .lora { align-self: flex-start; background: #111111; }
        .chat-input-area { margin-top: 15px; display: flex; gap: 10px; }

        /* Form Interaction Fields */
        input { width: 100%; background: #000000; border: 1px solid #00ff00; padding: 10px; color: #00ff00; font-family: monospace; }
        input:focus { background: #111111; outline: none; }
        button { background: #00ff00; color: #000000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; font-family: monospace; text-transform: uppercase; }
        button:hover { background: #00cc00; }
        
        .status-tag { font-size: 0.8rem; background: #222222; padding: 2px 6px; border: 1px solid #00ff00; }
    </style>
</head>
<body>

    <div class="panel chat-container">
        <div class="chat-header">
            <div>NODE SYSTEM ID: ROOT_USER</div>
            <div style="display:flex; gap:10px; align-items:center;">
                <span id="sessionStatus" class="status-tag">DIRECT ACCESS</span>
            </div>
        </div>
        <div class="chat-messages" id="chatBox">
            <div class="message lora">Core initialized. Execution terminal prepared. Direct link mode active.</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="EXECUTE COMMAND..." onkeydown="if(event.key === 'Enter') sendTerminalMessage()" autofocus>
            <button onclick="sendTerminalMessage()">Execute</button>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8000/chat";

        async function sendTerminalMessage() {
            const input = document.getElementById("userInput");
            const chatBox = document.getElementById("chatBox");
            const query = input.value.trim();
            
            if (!query) return;

            // Render user input element instantly
            const userDiv = document.createElement("div");
            userDiv.className = "message user";
            userDiv.innerText = `USER: ${query}`;
            chatBox.appendChild(userDiv);
            
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: query })
                });

                if (!response.ok) throw new Error("BAD_STATUS");
                
                const data = await response.json();
                
                const loraDiv = document.createElement("div");
                loraDiv.className = "message lora";
                loraDiv.innerText = `LORA: ${data.reply}`;
                chatBox.appendChild(loraDiv);
            } catch (err) {
                const errorDiv = document.createElement("div");
                errorDiv.className = "message lora";
                errorDiv.style.color = "#ff0000";
                errorDiv.style.borderColor = "#ff0000";
                errorDiv.innerText = "CRITICAL ERROR: Failed connection string to remote process runtime backend.";
                chatBox.appendChild(errorDiv);
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
